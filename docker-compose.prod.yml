services:
  mysql:
    image: mysql:8.4
    container_name: app-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ocorrencias}
      MYSQL_USER: ${MYSQL_USER:-ocorrencias}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ocorrencias}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: app-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
    networks:
      - app-network
      - dokploy-network
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: app-backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-ocorrencias}
      DB_USER: ${MYSQL_USER:-ocorrencias}
      DB_PASSWORD: ${MYSQL_PASSWORD:-ocorrencias}
    networks:
      - app-network
      - dokploy-network
    depends_on:
      - mysql

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api-ocorrencias1.lab7.cloud}
    container_name: app-frontend
    restart: unless-stopped
    networks:
      - dokploy-network
    depends_on:
      - backend
volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge
  dokploy-network:
    external: true