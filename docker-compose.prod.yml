services:
  mysql:
    image: mysql:8.4
    container_name: app-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ocorrencias}
      MYSQL_USER: ${MYSQL_USER:-ocorrencias}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ocorrencias}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - dokploy-network
    expose:
      - "3306"
    command: 
      - mysqld
      - --performance_schema=OFF
      - --innodb_buffer_pool_size=64M
      - --innodb_log_buffer_size=1M
      - --max_connections=20
      - --key_buffer_size=8M
      - --thread_cache_size=2
      - --innodb_ft_cache_size=1600000
      - --innodb_ft_total_cache_size=32000000

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: app-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
    depends_on:
      - mysql
    networks:
      - dokploy-network
    expose:
      - "80"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: app-backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-ocorrencias}
      DB_USER: ${MYSQL_USER:-ocorrencias}
      DB_PASSWORD: ${MYSQL_PASSWORD:-ocorrencias}
    networks:
      - dokploy-network
    depends_on:
      - mysql
    expose:
      - "3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api-ocorrencias1.lab7.cloud}
    container_name: app-frontend
    restart: unless-stopped
    networks:
      - dokploy-network
    depends_on:
      - backend
    expose:
      - "3000"
volumes:
  mysql_data:

networks:
  dokploy-network:
    external: true